version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: ctrl-fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ctrl_fleet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: ctrl-fleet-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: ctrl-fleet-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ctrl_fleet
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    volumes:
      - ./back:/app
      - maven_repo:/root/.m2
    working_dir: /app
    command: mvn -DskipTests spring-boot:run

  frontend:
    image: node:20
    container_name: ctrl-fleet-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./front:/app
      - node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 5173"

volumes:
  postgres_data:
  maven_repo:
  node_modules: