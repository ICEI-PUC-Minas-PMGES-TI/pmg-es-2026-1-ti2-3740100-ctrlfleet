services:

  postgres:
    image: postgres:15
    container_name: ctrl-fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ctrl_fleet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ctrl_fleet"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: ctrl-fleet-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ctrl-fleet-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: ctrl-fleet-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/ctrl_fleet}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-admin}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-ctrlfleet-dev-secret-key-min-32-chars!!}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailhog}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS: ${SPRING_MAIL_SMTP_STARTTLS:-false}
      CTRLFLEET_MAIL_ENABLED: ${CTRLFLEET_MAIL_ENABLED:-true}
      CTRLFLEET_MAIL_FROM: ${CTRLFLEET_MAIL_FROM:-noreply@ctrlfleet.gov.br}
      CTRLFLEET_MAIL_FROM_NAME: ${CTRLFLEET_MAIL_FROM_NAME:-CtrlFleet}
      CTRLFLEET_MAIL_APP_URL: ${CTRLFLEET_MAIL_APP_URL:-http://localhost:5173}
      TZ: ${TZ:-America/Sao_Paulo}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Duser.timezone=America/Sao_Paulo}
    volumes:
      - ./back:/app
      - maven_repo:/root/.m2
    working_dir: /app
    command: mvn -DskipTests compile spring-boot:run
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s

  frontend:
    image: node:20
    container_name: ctrl-fleet-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./front:/app
      - node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 5173"

volumes:
  postgres_data:
  maven_repo:
  node_modules:
