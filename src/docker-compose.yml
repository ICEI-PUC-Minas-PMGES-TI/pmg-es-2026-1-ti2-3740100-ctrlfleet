version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: ctrl-fleet-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ctrl_fleet

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: ctrl-fleet-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data:
