spring.application.name=back

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.time-zone=America/Sao_Paulo

# Inicialização do data.sql (carga inicial de mocks).
# - defer-datasource-initialization: garante que o data.sql rode DEPOIS que o Hibernate criar as tabelas via ddl-auto=update.
# - sql.init.mode=always: necessário porque o PostgreSQL não é um banco "embedded", e por padrão o Spring só roda data.sql para embedded.
# - sql.init.continue-on-error=true: permite que INSERTs em tabelas/colunas que ainda não existem (entidades não criadas) sejam ignorados sem derrubar a aplicação.
# A idempotência (não duplicar dados) é garantida pelos ON CONFLICT DO NOTHING dentro do próprio data.sql.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ctrl_fleet}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# Chave HMAC para JWT (mínimo 32 caracteres — apenas dev/local).
jwt.secret=${JWT_SECRET:ctrlfleet-dev-secret-key-min-32-chars!!}

# E-mail (Spring Mail)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}
spring.mail.default-encoding=UTF-8

ctrlfleet.mail.enabled=${CTRLFLEET_MAIL_ENABLED:true}
ctrlfleet.mail.from=${CTRLFLEET_MAIL_FROM:noreply@ctrlfleet.gov.br}
ctrlfleet.mail.from-name=${CTRLFLEET_MAIL_FROM_NAME:CtrlFleet}